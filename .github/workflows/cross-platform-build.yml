name: Cross-Platform Build Test

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Cargo profile to build"
        required: false
        default: "release"
        type: choice
        options:
          - release
          - debug
      platform:
        description: "Platform to build"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - desktop
          - android
          - ios

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  desktop:
    name: Desktop / ${{ matrix.label }}
    if: inputs.platform == 'all' || inputs.platform == 'desktop'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: desktop-${{ matrix.target }}

      - name: Build workspace
        shell: bash
        run: |
          mkdir -p results
          PROFILE="${{ inputs.profile }}"
          [ -z "$PROFILE" ] && PROFILE="release"
          FLAG="--release"
          [ "$PROFILE" = "debug" ] && FLAG=""
          if cargo build --workspace --target ${{ matrix.target }} $FLAG 2>&1 | tee results/build.log; then
            STATUS="success"
          else
            STATUS="failed"
          fi
          printf '{"platform":"%s","target":"%s","profile":"%s","status":"%s"}\n' \
            "${{ matrix.label }}" "${{ matrix.target }}" "$PROFILE" "$STATUS" > results/status.json
          [ "$STATUS" = "success" ]

      - name: Upload compiled binaries
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.label }}
          path: |
            target/${{ matrix.target }}/release/*.so
            target/${{ matrix.target }}/release/*.dll
            target/${{ matrix.target }}/release/*.dylib
            target/${{ matrix.target }}/release/*.a
            target/${{ matrix.target }}/debug/*.so
            target/${{ matrix.target }}/debug/*.dll
            target/${{ matrix.target }}/debug/*.dylib
            target/${{ matrix.target }}/debug/*.a

      - name: Upload status
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: status-${{ matrix.label }}
          path: results/status.json

  android:
    name: Android / ${{ matrix.abi }}
    if: inputs.platform == 'all' || inputs.platform == 'android'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            triple: aarch64-linux-android
          - abi: armeabi-v7a
            triple: armv7-linux-androideabi
          - abi: x86_64
            triple: x86_64-linux-android
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: android-${{ matrix.abi }}

      - name: Install cargo-apk
        run: cargo install cargo-apk --locked

      - name: Build Android APK
        shell: bash
        run: |
          mkdir -p results
          PROFILE="${{ inputs.profile }}"
          [ -z "$PROFILE" ] && PROFILE="release"
          FLAG="--release"
          [ "$PROFILE" = "debug" ] && FLAG=""
          
          # Navigate directly into the crate folder so cargo-apk matches the metadata cleanly
          cd crates/mxross-android
          
          if cargo apk build --target ${{ matrix.triple }} $FLAG 2>&1 | tee ../../results/build.log; then
            STATUS="success"
          else
            STATUS="failed"
          fi
          
          # Go back to the root directory to generate the status matrix
          cd ../..
          printf '{"platform":"android-%s","target":"%s","profile":"%s","status":"%s"}\n' \
            "${{ matrix.abi }}" "${{ matrix.triple }}" "$PROFILE" "$STATUS" > results/status.json
          [ "$STATUS" = "success" ]

      - name: Upload Installable APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: mxross-app-android-${{ matrix.abi }}
          # Even when running inside a crate folder, Cargo outputs artifacts to the workspace root target/ folder
          path: target/${{ matrix.triple }}/*/apk/*.apk

      - name: Upload status
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: status-android-${{ matrix.abi }}
          path: results/status.json

  ios:
    name: iOS / ${{ matrix.target }}
    if: inputs.platform == 'all' || inputs.platform == 'ios'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-ios
          - aarch64-apple-ios-sim
          - x86_64-apple-ios
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ios-${{ matrix.target }}

      - name: Build workspace
        shell: bash
        run: |
          mkdir -p results
          PROFILE="${{ inputs.profile }}"
          [ -z "$PROFILE" ] && PROFILE="release"
          FLAG="--release"
          [ "$PROFILE" = "debug" ] && FLAG=""
          if cargo build --workspace --target ${{ matrix.target }} $FLAG 2>&1 | tee results/build.log; then
            STATUS="success"
          else
            STATUS="failed"
          fi
          printf '{"platform":"ios-%s","target":"%s","profile":"%s","status":"%s"}\n' \
            "${{ matrix.target }}" "${{ matrix.target }}" "$PROFILE" "$STATUS" > results/status.json
          [ "$STATUS" = "success" ]

      - name: Upload compiled binaries
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: binaries-ios-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/*.a
            target/${{ matrix.target }}/release/*.dylib
            target/${{ matrix.target }}/debug/*.a
            target/${{ matrix.target }}/debug/*.dylib

      - name: Upload status
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: status-ios-${{ matrix.target }}
          path: results/status.json

  summary:
    name: Build Summary
    needs: [desktop, android, ios]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all status artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: status-*
          merge-multiple: false

      - name: Generate summary
        run: python3 scripts/build_summary.py --artifacts-dir artifacts >> "$GITHUB_STEP_SUMMARY"
