name: Cross-Platform Build Test

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Cargo profile to build"
        required: false
        default: "release"
        type: choice
        options:
          - release
          - debug
      platform:
        description: "Platform to build"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - desktop
          - android
          - ios

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  desktop:
    name: Desktop / ${{ matrix.label }}
    if: inputs.platform == 'all' || inputs.platform == 'desktop'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: desktop-${{ matrix.target }}

      - name: Build workspace
        shell: bash
        run: |
          mkdir -p results
          PROFILE="${{ inputs.profile }}"
          [ -z "$PROFILE" ] && PROFILE="release"
          FLAG="--release"
          [ "$PROFILE" = "debug" ] && FLAG=""
          if cargo build --workspace --target ${{ matrix.target }} $FLAG 2>&1 | tee results/build.log; then
            STATUS="success"
          else
            STATUS="failed"
          fi
          printf '{"platform":"%s","target":"%s","profile":"%s","status":"%s"}\n' \
            "${{ matrix.label }}" "${{ matrix.target }}" "$PROFILE" "$STATUS" > results/status.json
          [ "$STATUS" = "success" ]

      - name: Upload compiled binaries
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.label }}
          path: |
            target/${{ matrix.target }}/release/*.so
            target/${{ matrix.target }}/release/*.dll
            target/${{ matrix.target }}/release/*.dylib
            target/${{ matrix.target }}/release/*.a
            target/${{ matrix.target }}/debug/*.so
            target/${{ matrix.target }}/debug/*.dll
            target/${{ matrix.target }}/debug/*.dylib
            target/${{ matrix.target }}/debug/*.a

      - name: Upload status
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: status-${{ matrix.label }}
          path: results/status.json

  android:
    name: Android (cargo-apk)
    if: inputs.platform == 'all' || inputs.platform == 'android'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-linux-androideabi,aarch64-linux-android

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: android-apk

      - name: Install cargo-apk
        run: cargo install cargo-apk --locked

      # cargo-apk only auto-generates a keystore for the `dev` profile
      # (Android's own debug-keystore convention). Every other profile
      # name, including `release`, needs an explicit keystore — it won't
      # invent one for you. This one is throwaway: regenerated every run,
      # fine for installing/testing on your own device, NOT meant to be
      # the long-term signing key for anything you intend to update
      # build-to-build (swap to a persisted GitHub Secret for that later).
      - name: Generate ephemeral signing keystore
        shell: bash
        run: |
          mkdir -p "$HOME/.android"
          keytool -genkeypair -v \
            -keystore "$HOME/.android/mxross-ci-release.keystore" \
            -storepass "mxross-ci" \
            -alias mxross-ci \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=MxRoss CI, OU=MidManStudio, O=MidManStudio, L=Unknown, S=Unknown, C=US"
          echo "CARGO_APK_RELEASE_KEYSTORE=$HOME/.android/mxross-ci-release.keystore" >> "$GITHUB_ENV"
          echo "CARGO_APK_RELEASE_KEYSTORE_PASSWORD=mxross-ci" >> "$GITHUB_ENV"

      - name: Install required Android SDK platform
        shell: bash
        run: |
          SDKMANAGER="sdkmanager"
          command -v sdkmanager >/dev/null 2>&1 || SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          "$SDKMANAGER" --install "platforms;android-33"

      - name: Build Android APK
        shell: bash
        run: |
          mkdir -p results
          PROFILE="${{ inputs.profile }}"
          [ -z "$PROFILE" ] && PROFILE="release"
          FLAG="--release"
          [ "$PROFILE" = "debug" ] && FLAG=""

          cd crates/mxross-android
          if cargo apk build $FLAG 2>&1 | tee ../../results/build.log; then
            STATUS="success"
          else
            STATUS="failed"
          fi
          cd ../..

          printf '{"platform":"android-multiarch","target":"armv7+aarch64","profile":"%s","status":"%s"}\n' \
            "$PROFILE" "$STATUS" > results/status.json
          [ "$STATUS" = "success" ]

      - name: Locate built APK (debug aid)
        if: always()
        shell: bash
        run: find target -iname "*.apk" 2>/dev/null || echo "No .apk found under target/"

      - name: Upload Installable APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: mxross-app-android
          path: target/**/apk/*.apk

      - name: Upload status
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: status-android
          path: results/status.json

  ios:
    name: iOS / ${{ matrix.target }}
    if: inputs.platform == 'all' || inputs.platform == 'ios'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-ios
          - aarch64-apple-ios-sim
          - x86_64-apple-ios
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ios-${{ matrix.target }}

      - name: Build workspace
        shell: bash
        run: |
          mkdir -p results
          PROFILE="${{ inputs.profile }}"
          [ -z "$PROFILE" ] && PROFILE="release"
          FLAG="--release"
          [ "$PROFILE" = "debug" ] && FLAG=""
          if cargo build --workspace --target ${{ matrix.target }} $FLAG 2>&1 | tee results/build.log; then
            STATUS="success"
          else
            STATUS="failed"
          fi
          printf '{"platform":"ios-%s","target":"%s","profile":"%s","status":"%s"}\n' \
            "${{ matrix.target }}" "${{ matrix.target }}" "$PROFILE" "$STATUS" > results/status.json
          [ "$STATUS" = "success" ]

      - name: Upload compiled binaries
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: binaries-ios-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/*.a
            target/${{ matrix.target }}/release/*.dylib
            target/${{ matrix.target }}/debug/*.a
            target/${{ matrix.target }}/debug/*.dylib

      - name: Upload status
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: status-ios-${{ matrix.target }}
          path: results/status.json

  summary:
    name: Build Summary
    needs: [desktop, android, ios]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all status artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: status-*
          merge-multiple: false

      - name: Generate summary
        run: python3 scripts/build_summary.py --artifacts-dir artifacts >> "$GITHUB_STEP_SUMMARY"
