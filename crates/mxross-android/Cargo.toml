[package]
name    = "mxross-android"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
# native-activity, not game-activity — cargo-apk has no Gradle/Maven step,
# so it can't pull in the androidx.games:games-activity .aar that
# game-activity depends on at runtime. NativeActivity ships in the
# platform itself, which is exactly what cargo-apk is built around.
android-activity   = { version = "0.6", features = ["native-activity"] }
mxross-canvas-core = { path = "../mxross-canvas-core" }

[package.metadata.android]
package      = "com.midmanstudio.mxross"
# armv7 covers older/budget hardware, aarch64 covers the A13 and anything
# newer — both genuinely relevant targets, not padding.
build_targets = ["armv7-linux-androideabi", "aarch64-linux-android"]

[package.metadata.android.sdk]
min_sdk_version    = 26
target_sdk_version = 33

[package.metadata.android.application]
label = "MxRoss Canvas"
